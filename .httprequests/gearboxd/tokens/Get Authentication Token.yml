info:
  name: Get Authentication Token
  type: http
  seq: 1

http:
  method: POST
  url: "{{domain}}/v1/tokens/authentication"
  body:
    type: json
    data: |-
      {
        "email": "admin@gearboxd.com",
        "password": "12345678"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
