info:
  name: List Cars
  type: http
  seq: 5

http:
  method: GET
  url: "{{domain}}/v1/cars?make=Volvo&model=XC60&year=2023&gearbox=automatic&drivetrain=AWD&fuel=hybrid&horsepower_min=100&horsepower_max=300&price_min=30000&price_max=55000&page=1&page_size=5&sort=make"
  params:
    - name: make
      value: Volvo
      type: query
    - name: model
      value: XC60
      type: query
    - name: year
      value: "2023"
      type: query
    - name: gearbox
      value: automatic
      type: query
    - name: drivetrain
      value: AWD
      type: query
    - name: fuel
      value: hybrid
      type: query
    - name: horsepower_min
      value: "100"
      type: query
    - name: horsepower_max
      value: "300"
      type: query
    - name: price_min
      value: "30000"
      type: query
    - name: price_max
      value: "55000"
      type: query
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "5"
      type: query
    - name: sort
      value: make
      type: query
  auth: inherit

runtime:
  variables:
    - name: domain
      value: http://localhost:4000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
